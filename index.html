<!DOCTYPE html>
<html lang="ja" class="dark scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Pages Docs</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind Typography plugin -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          typography: (theme) => ({
            DEFAULT: {
              css: {
                color: theme('colors.gray.800'),
                a: { color: theme('colors.blue.600'), '&:hover': { color: theme('colors.blue.500') } },
                code: { color: theme('colors.pink.500'), backgroundColor: theme('colors.gray.100'), padding: '0.2rem 0.4rem', borderRadius: '0.25rem', fontWeight: '400' },
                'code::before': { content: '""' },
                'code::after': { content: '""' },
              },
            },
            dark: {
              css: {
                color: theme('colors.gray.300'),
                a: { color: theme('colors.blue.400'), '&:hover': { color: theme('colors.blue.300') } },
                h1: { color: theme('colors.gray.50') },
                h2: { color: theme('colors.gray.50') },
                h3: { color: theme('colors.gray.50') },
                h4: { color: theme('colors.gray.50') },
                strong: { color: theme('colors.gray.50') },
                code: { color: theme('colors.pink.400'), backgroundColor: theme('colors.gray.800') },
                blockquote: { color: theme('colors.gray.400'), borderLeftColor: theme('colors.gray.700') },
                hr: { borderColor: theme('colors.gray.800') },
                thead: { color: theme('colors.gray.50'), borderBottomColor: theme('colors.gray.700') },
                tbody: { tr: { borderBottomColor: theme('colors.gray.800') } }
              },
            },
          }),
        }
      }
    }
  </script>

  <!-- Marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- DOMPurify (for secure rendering) -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

  <!-- Prism.js (Syntax Highlighting) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  
  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Active state for sidebar navigation */
    .nav-item.active { background-color: #eff6ff; color: #2563eb; font-weight: 500; }
    .dark .nav-item.active { background-color: #1e3a8a; color: #60a5fa; }
  </style>
</head>
<body class="bg-white text-gray-900 dark:bg-gray-950 dark:text-gray-100 transition-colors duration-200">

  <!-- OVERLAY FOR MOBILE -->
  <div id="mobile-overlay" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm z-30 hidden md:hidden"></div>

  <div class="flex h-screen overflow-hidden">
    <!-- SIDEBAR -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 border-r border-gray-200 dark:border-gray-800 bg-gray-50/80 dark:bg-gray-900/80 backdrop-blur-md transform -translate-x-full md:translate-x-0 md:static flex flex-col transition-transform duration-300 ease-in-out shrink-0 p-4">
      
      <!-- Logo & Controls -->
      <div class="flex items-center justify-between pb-6 pt-2 border-b border-gray-200 dark:border-gray-800">
        <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent" id="site-title">Docs</h1>
        <div class="flex gap-2">
          <!-- Dark Mode Toggle -->
          <button id="dark-btn" class="p-2 rounded-xl bg-gray-200 dark:bg-gray-800 text-gray-500 dark:text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 transition-colors shadow-sm">
            <svg id="moon-icon" class="w-5 h-5 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
            <svg id="sun-icon" class="w-5 h-5 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
          </button>
          <button id="close-sidebar-btn" class="p-2 md:hidden text-gray-500 hover:text-gray-900 dark:hover:text-white">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
          </button>
        </div>
      </div>

      <nav id="sidebar-nav" class="flex-1 overflow-y-auto no-scrollbar space-y-1 mt-4">
        <!-- Navigation links injected here -->
        <div class="animate-pulse space-y-3 py-4 pl-4">
          <div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-2/3"></div>
          <div class="h-4 bg-gray-200 dark:bg-gray-800 rounded w-1/2"></div>
        </div>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col min-w-0 h-full overflow-hidden bg-white dark:bg-gray-950 relative">
      
      <!-- Mobile Header -->
      <header class="md:hidden p-4 border-b border-gray-200 dark:border-gray-800 flex items-center justify-between bg-white/80 dark:bg-gray-950/80 backdrop-blur-md sticky top-0 z-20">
        <button id="mobile-menu-btn" class="p-2 -ml-2 text-gray-600 dark:text-gray-400">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
        </button>
        <div class="font-bold whitespace-nowrap overflow-hidden text-ellipsis px-4" id="mobile-title">Loading...</div>
        <div class="w-8"></div><!-- Spacer for centering -->
      </header>
      
      <!-- Content Area -->
      <div class="flex-1 overflow-y-auto scroll-smooth" id="scroll-container">
        <div class="max-w-[90rem] mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col-reverse lg:flex-row gap-12 relative items-start">
          
          <!-- Document Article -->
          <article class="flex-1 min-w-0">
            <div id="content" class="prose prose-slate dark:prose-dark max-w-none prose-img:rounded-xl">
              <!-- Content injected here -->
            </div>
            
            <!-- Footer navigation (Previous/Next) -->
            <div id="doc-footer" class="mt-16 pt-8 border-t border-gray-200 dark:border-gray-800 flex justify-between hidden">
              <a id="prev-link" href="#" class="group flex flex-col items-start gap-1 p-4 rounded-xl shadow-sm border border-gray-200 dark:border-gray-800 hover:border-blue-500 dark:hover:border-blue-500 transition-colors w-[48%] bg-white dark:bg-gray-900">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider group-hover:text-blue-500 transition-colors">Previous</span>
                <span class="font-medium text-gray-900 dark:text-gray-100 truncate w-full" id="prev-title"></span>
              </a>
              <a id="next-link" href="#" class="group flex flex-col items-end gap-1 p-4 rounded-xl shadow-sm border border-gray-200 dark:border-gray-800 hover:border-blue-500 dark:hover:border-blue-500 transition-colors w-[48%] text-right bg-white dark:bg-gray-900">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider group-hover:text-blue-500 transition-colors">Next</span>
                <span class="font-medium text-gray-900 dark:text-gray-100 truncate w-full" id="next-title"></span>
              </a>
            </div>
          </article>

          <!-- Table of Contents -->
          <aside class="w-full lg:w-64 shrink-0 lg:sticky lg:top-8 order-first lg:order-last border-b lg:border-b-0 border-gray-200 dark:border-gray-800 pb-8 lg:pb-0">
            <div class="lg:p-5 lg:rounded-2xl lg:bg-gray-50 lg:dark:bg-gray-900 lg:border lg:border-gray-100 lg:dark:border-gray-800">
              <div class="mb-4 font-bold text-xs tracking-wider text-gray-900 dark:text-gray-100 uppercase flex items-center gap-2">
                <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" /></svg>
                On this page
              </div>
              <ul id="toc-list" class="space-y-2.5 lg:max-h-[60vh] lg:overflow-y-auto no-scrollbar">
                <!-- TOC links injected here -->
                <li class="text-sm text-gray-400 italic">No structure available</li>
              </ul>
            </div>
          </aside>

        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>

  <script>
    /* =========================================
     * APP CONFIGURATION - MODIFY THESE VALUES
     * ========================================= */
    const CONFIG = {
      owner: 'microsoft',         // 👈 変更: GitHubユーザー名 or 組織名 (例: 'microsoft')
      repo: 'TypeScript',         // 👈 変更: リポジトリ名 (例: 'TypeScript')
      branch: 'main',             // 👈 変更: 対象ブランチ (例: 'main' や 'master')
      docsFolder: 'doc',          // 👈 変更: ドキュメントが存在するフォルダ (ルートなら '')
      ghToken: '',                // (オプション) APIレート制限回避のためのPersonal Access Token
    };

    // State
    let allFiles = [];
    let currentPage = new URLSearchParams(window.location.search).get('page');

    /* =========================
     * INITIALIZATION
     * ========================= */
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('site-title').innerText = CONFIG.repo;
      
      initTheme();
      initMobileMenu();
      fetchDocsTree();
      
      window.addEventListener('popstate', () => {
        currentPage = new URLSearchParams(window.location.search).get('page');
        if(currentPage) loadContent(currentPage);
      });
    });

    /* =========================
     * THEME MANAGEMENT
     * ========================= */
    function initTheme() {
      const html = document.documentElement;
      const toggleTheme = () => {
        html.classList.toggle('dark');
        localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      };

      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        html.classList.add('dark');
      } else {
        html.classList.remove('dark');
      }
      document.getElementById('dark-btn').addEventListener('click', toggleTheme);
    }

    /* =========================
     * MOBILE MENU
     * ========================= */
    function initMobileMenu() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('mobile-overlay');

      const toggleMenu = () => {
        sidebar.classList.toggle('-translate-x-full');
        overlay.classList.toggle('hidden');
      };

      document.getElementById('mobile-menu-btn').addEventListener('click', toggleMenu);
      document.getElementById('close-sidebar-btn').addEventListener('click', toggleMenu);
      overlay.addEventListener('click', toggleMenu);
    }

    /* =========================
     * FETCH DIRECTORY TREE
     * ========================= */
    async function fetchDocsTree() {
      const headers = {};
      if (CONFIG.ghToken) headers['Authorization'] = `token ${CONFIG.ghToken}`;

      try {
        // NOTE: contents APIだと階層ごとのリクエストでRate Limitに引っかかりやすいため、
        // Git Trees APIを使用してディレクトリ構造を一括取得します。
        const res = await fetch(`https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/git/trees/${CONFIG.branch}?recursive=1`, { headers });
        
        if (res.status === 403) {
            throw new Error('GitHub API Rate Limit Exceeded: 1時間あたりのリクエスト制限に達しました。CONFIG.ghTokenを設定してください。');
        }
        if (!res.ok) throw new Error('Repository tree fetch failed. Check ownership, repo name, and branch settings.');
        
        const data = await res.json();
        
        const prefix = CONFIG.docsFolder ? `${CONFIG.docsFolder}/` : '';
        allFiles = data.tree.filter(item => item.type === 'blob' && item.path.startsWith(prefix) && item.path.endsWith('.md'));

        buildNavigation();
        
        // Use Index or first file as fallback if "page" param is empty
        if (!currentPage && allFiles.length > 0) {
          const indexFile = allFiles.find(f => f.path.toLowerCase() === `${prefix}index.md` || f.path.toLowerCase() === `${prefix}readme.md`);
          currentPage = indexFile ? indexFile.path : allFiles[0].path;
          window.history.replaceState({}, '', `?page=${encodeURIComponent(currentPage)}`);
        }

        if(currentPage) loadContent(currentPage);

      } catch (err) {
        document.getElementById('sidebar-nav').innerHTML = `
            <div class="p-4 m-2 text-sm bg-red-100 dark:bg-red-900 border border-red-300 dark:border-red-700 text-red-600 dark:text-red-300 rounded">
                ${err.message}
            </div>`;
        if(!currentPage) {
          document.getElementById('content').innerHTML = `<h1>Error</h1><p>${err.message}</p>`;
        } else {
          // Attempt loading anyway bypassing API tree
          loadContent(currentPage); 
        }
      }
    }

    /* =========================
     * BUILD SIDEBAR
     * ========================= */
    function buildNavigation() {
      const nav = document.getElementById('sidebar-nav');
      nav.innerHTML = '';
      
      const grouped = {};
      const prefixLength = CONFIG.docsFolder ? CONFIG.docsFolder.length + 1 : 0;

      allFiles.forEach(file => {
        const subpath = file.path.substring(prefixLength); 
        const parts = subpath.split('/');
        const name = parts.pop().replace(/\.md$/i, '').replace(/-/g, ' '); 
        const folder = parts.join('/');
        
        if (!grouped[folder]) grouped[folder] = [];
        grouped[folder].push({ name, path: file.path });
      });

      for (const [folder, items] of Object.entries(grouped)) {
        if (folder) {
          const folderParts = folder.split('/');
          const folderName = folderParts[folderParts.length - 1].replace(/-/g, ' ');
          const header = document.createElement('div');
          
          header.className = `font-bold text-xs uppercase tracking-widest text-gray-400 dark:text-gray-500 mt-6 mb-2`;
          header.style.paddingLeft = `${0.5 + folderParts.length * 0.5}rem`;
          header.textContent = folderName;
          nav.appendChild(header);
        }

        items.forEach(item => {
          const a = document.createElement('a');
          const isCurrent = currentPage === item.path;
          a.href = `?page=${encodeURIComponent(item.path)}`;
          
          const depth = folder ? folder.split('/').length + 1 : 1;
          a.style.paddingLeft = `${0.5 + depth * 0.5}rem`;
          
          let baseClasses = `nav-item block py-2 pr-3 text-sm rounded-lg transition-colors capitalize `;
          a.className = isCurrent 
            ? baseClasses + `active` 
            : baseClasses + `text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800/60`;

          a.textContent = item.name;

          // Navigation Click Event
          a.addEventListener('click', (e) => {
            e.preventDefault();
            currentPage = item.path;
            window.history.pushState({}, '', `?page=${encodeURIComponent(item.path)}`);
            updateNavHighlight();
            loadContent(currentPage);
            
            if(window.innerWidth < 768) {
              document.getElementById('sidebar').classList.add('-translate-x-full');
              document.getElementById('mobile-overlay').classList.add('hidden');
            }
          });

          nav.appendChild(a);
        });
      }
    }

    function updateNavHighlight() {
      document.querySelectorAll('.nav-item').forEach(el => {
        const url = new URL(el.href);
        if (url.searchParams.get('page') === currentPage) {
          el.className = `nav-item block py-2 pr-3 text-sm rounded-lg transition-colors capitalize active relative before:absolute before:left-0 before:top-1/2 before:-translate-y-1/2 before:w-1 before:h-2/3 before:bg-blue-600 before:rounded-r-full`;
          el.style.backgroundColor = document.documentElement.classList.contains('dark') ? 'rgba(59, 130, 246, 0.1)' : '#eff6ff';
          el.style.color = document.documentElement.classList.contains('dark') ? '#60a5fa' : '#2563eb';
        } else {
          el.className = `nav-item block py-2 pr-3 text-sm rounded-lg transition-colors capitalize text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800/60`;
          el.style.backgroundColor = '';
          el.style.color = '';
        }
      });
      updateFooterNav();
    }

    function updateFooterNav() {
        if(allFiles.length === 0) return;
        const currentIndex = allFiles.findIndex(f => f.path === currentPage);
        const footer = document.getElementById('doc-footer');
        const prevLink = document.getElementById('prev-link');
        const nextLink = document.getElementById('next-link');
        
        if(currentIndex === -1) {
            footer.classList.add('hidden');
            return;
        }
        
        footer.classList.remove('hidden');
        
        if (currentIndex > 0) {
            const prev = allFiles[currentIndex - 1];
            prevLink.href = `?page=${encodeURIComponent(prev.path)}`;
            document.getElementById('prev-title').textContent = prev.path.split('/').pop().replace(/\.md$/i, '').replace(/-/g, ' ');
            prevLink.classList.remove('opacity-0', 'pointer-events-none');
            
            prevLink.onclick = (e) => {
                e.preventDefault();
                currentPage = prev.path;
                window.history.pushState({}, '', prevLink.href);
                updateNavHighlight();
                loadContent(currentPage);
            }
        } else {
            prevLink.classList.add('opacity-0', 'pointer-events-none');
        }

        if (currentIndex < allFiles.length - 1) {
            const next = allFiles[currentIndex + 1];
            nextLink.href = `?page=${encodeURIComponent(next.path)}`;
            document.getElementById('next-title').textContent = next.path.split('/').pop().replace(/\.md$/i, '').replace(/-/g, ' ');
            nextLink.classList.remove('opacity-0', 'pointer-events-none');
            
            nextLink.onclick = (e) => {
                e.preventDefault();
                currentPage = next.path;
                window.history.pushState({}, '', nextLink.href);
                updateNavHighlight();
                loadContent(currentPage);
            }
        } else {
            nextLink.classList.add('opacity-0', 'pointer-events-none');
        }
    }

    /* =========================
     * LOAD CONTENT & PARSE
     * ========================= */
    async function loadContent(pagePath) {
      if (!pagePath) return;

      const contentEl = document.getElementById('content');
      
      contentEl.innerHTML = `
        <div class="flex flex-col justify-center items-center py-32 gap-4">
          <div class="animate-spin rounded-full h-10 w-10 border-4 border-gray-100 dark:border-gray-800 border-t-blue-600 dark:border-t-blue-500"></div>
        </div>
      `;

      try {
        // Note: raw.githubusercontent.com API制限を回避できます
        const url = `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${pagePath}`;
        const res = await fetch(url);
        
        if (!res.ok) throw new Error('Document not found (404). URL is incorrect or you have no rights to read.');
        const markdown = await res.text();

        // 内部リンク(.md)をSPAのルーティングに書き換えるカスタムレンダラー
        const renderer = new marked.Renderer();
        renderer.link = function(href, title, text) {
          if (href && !href.startsWith('http') && !href.startsWith('#') && href.endsWith('.md')) {
            const currParts = pagePath.split('/');
            currParts.pop();
            const targetParts = href.split('/');
            for (const part of targetParts) {
              if (part === '.') continue;
              if (part === '..') currParts.pop();
              else currParts.push(part);
            }
            href = `?page=${encodeURIComponent(currParts.join('/'))}`;
          }
          return `<a href="${href}" ${title ? `title="${title}"` : ''}>${text}</a>`;
        };
        marked.use({ renderer });

        // Parse to HTML (Sanitized for safety)
        contentEl.innerHTML = DOMPurify.sanitize(marked.parse(markdown));

        // Enhancements
        document.getElementById('scroll-container').scrollTop = 0;
        generateTOC();
        enhanceTables(contentEl);
        if (window.Prism) Prism.highlightAllUnder(contentEl);

        // Update Title
        const h1 = contentEl.querySelector('h1');
        const bareName = pagePath.split('/').pop().replace(/\.md$/i, '').replace(/-/g, ' ');
        document.title = `${h1 ? h1.innerText : bareName} | Docs`;
        document.getElementById('mobile-title').innerText = h1 ? h1.innerText : bareName;
        
        // Handle SPA internal link clicks
        contentEl.querySelectorAll('a[href^="?page="]').forEach(a => {
            a.addEventListener('click', (e) => {
                e.preventDefault();
                const targetPage = new URL(a.href).searchParams.get('page');
                if(targetPage) {
                    currentPage = targetPage;
                    window.history.pushState({}, '', a.href);
                    updateNavHighlight();
                    loadContent(currentPage);
                }
            });
        });

      } catch (err) {
        contentEl.innerHTML = `
          <div class="p-8 bg-red-50 dark:bg-red-900/10 border border-red-200 dark:border-red-900 border-l-4 border-l-red-500 rounded-lg">
            <h1 class="text-red-600 dark:text-red-400 text-xl font-bold mb-2">Error Loading Content</h1>
            <p class="text-red-500 dark:text-red-300">${err.message}</p>
          </div>
        `;
      }
    }

    /* =========================
     * TABLE OF CONTENTS (TOC)
     * ========================= */
    function generateTOC() {
      const contentEl = document.getElementById('content');
      const headings = contentEl.querySelectorAll('h1, h2, h3');
      const tocList = document.getElementById('toc-list');
      
      tocList.innerHTML = '';
      if (headings.length === 0) {
        tocList.innerHTML = '<li class="text-sm text-gray-400 italic">No structure...</li>';
        return;
      }

      const rootLevel = Math.min(...Array.from(headings).map(hd => parseInt(hd.tagName[1])));

      headings.forEach(h => {
        if (!h.id) {
          h.id = h.innerText.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]/g, '');
        }

        const li = document.createElement('li');
        const level = parseInt(h.tagName[1]);
        const indent = Math.max(0, level - rootLevel);
        
        const a = document.createElement('a');
        a.href = `#${h.id}`;
        a.className = `toc-link group flex text-sm font-medium transition-colors duration-200 block ${
            indent === 0 
            ? 'text-gray-800 dark:text-gray-200 hover:text-blue-600 dark:hover:text-blue-400' 
            : 'text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-200'
        }`;
        
        a.style.paddingLeft = `${indent * 1}rem`;
        a.innerHTML = `<span class="align-middle mt-1.5 w-1 h-1 rounded-full bg-blue-500 opacity-0 group-hover:opacity-100 mr-2 transition-opacity inline-block ${indent === 0 ? '-ml-3 absolute' : ''}"></span> ${h.innerText}`;
        
        a.addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById(h.id).scrollIntoView({ behavior: 'smooth' });
            window.history.pushState(null, null, `#${h.id}`);
        });

        li.appendChild(a);
        tocList.appendChild(li);
      });
    }

    /* =========================
     * UTILITIES
     * ========================= */
    function enhanceTables(container) {
        const tables = container.querySelectorAll('table');
        tables.forEach(table => {
            const wrapper = document.createElement('div');
            wrapper.className = 'w-full overflow-x-auto my-8 pb-4';
            table.parentNode.insertBefore(wrapper, table);
            wrapper.appendChild(table);
            table.classList.add('w-full', 'text-left', 'border-collapse');
        });
    }
  </script>
</body>
</html>
